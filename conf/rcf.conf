<?xml version="1.0" ?>
<rcf>
    <!-- Main agent -->
    <ta
        name="${TA_MAIN_HOST_TA_NAME}"
        type="${TA_MAIN_HOST_TA_TYPE}"
        synch_time="yes"
        disabled="${TA_MAIN_HOST:-yes}"
        rcflib="rcfunix"
        rebootable="${TA_MAIN_REBOOTABLE}"
    >
        <conf name="host">${TA_MAIN_HOST}</conf>
        <conf name="port">${TA_MAIN_RCF_PORT:-${TE_RCF_PORT:-50000}}</conf>
        <conf name="user">${TA_MAIN_HOST_SSH_USER:-${TE_SSH_USER}}</conf>
        <conf name="key">${TA_MAIN_HOST_SSH_KEY:-${TE_SSH_KEY}}</conf>
        <conf name="copy_timeout">${TE_RCFUNIX_TIMEOUT}</conf>
        <conf name="kill_timeout">${TE_RCFUNIX_TIMEOUT}</conf>
        <conf name="sudo" cond="${TA_MAIN_HOST_SUDO:-true}" />
        <conf name="shell">${TA_MAIN_VG}</conf>
    </ta>

    <!-- Zisk agent -->
    <ta
        name="${TA_ZISK_HOST_TA_NAME}"
        type="${TA_ZISK_HOST_TA_TYPE}"
        synch_time="yes"
        disabled="${TA_ZISK_HOST:-yes}"
        rcflib="rcfunix"
        rebootable="${TA_ZISK_REBOOTABLE}"
    >
        <conf name="host">${TA_ZISK_HOST}</conf>
        <conf name="port">${TA_ZISK_RCF_PORT:-${TE_RCF_PORT:-50000}}</conf>
        <conf name="user">${TA_ZISK_HOST_SSH_USER:-${TE_SSH_USER}}</conf>
        <conf name="key">${TA_ZISK_HOST_SSH_KEY:-${TE_SSH_KEY}}</conf>
        <conf name="copy_timeout">${TE_RCFUNIX_TIMEOUT}</conf>
        <conf name="kill_timeout">${TE_RCFUNIX_TIMEOUT}</conf>
        <conf name="sudo" cond="${TA_ZISK_HOST_SUDO:-true}" />
        <conf name="shell">${TA_ZISK_VG}</conf>
    </ta>
</rcf>
